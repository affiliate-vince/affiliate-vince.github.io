  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #171717;
      --bg3: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text2: #888;
      --accent: #E8FF47;
      --accent-dim: #b8cc35;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--text2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── Hero Banner ─── */
    .hero {
      position: relative;
      height: 480px;
      overflow: hidden;
      background: var(--bg2);
    }

    .slides-wrapper {
      display: flex;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      text-decoration: none;
      position: relative;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(232,255,71,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .slide-content {
      text-align: center;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .slide-brand-img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
      padding: 12px;
      margin: 0 auto 28px;
      display: block;
    }

    .slide-brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .slide-category {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .slide-desc {
      font-size: 1rem;
      color: var(--text2);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .slide-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 12px 28px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .slide-cta:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    /* Dot indicators */
    .dots {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Prev/Next arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(15,15,15,0.7);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: var(--text);
      transition: background 0.2s;
      font-size: 1.1rem;
    }

    .nav-arrow:hover { background: var(--bg3); }
    .nav-arrow.prev { left: 20px; }
    .nav-arrow.next { right: 20px; }

    /* ─── Section ─── */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 40px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .section-sub {
      font-size: 0.85rem;
      color: var(--text2);
    }

    /* ─── Brand Grid ─── */
    .brand-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .brand-card {
      background: var(--bg2);
      padding: 32px 28px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .brand-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .brand-card:hover { background: var(--bg3); }
    .brand-card:hover::after { transform: scaleX(1); }

    .brand-card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .brand-card-img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      flex-shrink: 0;
    }

    .brand-card-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .brand-card-cat {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .brand-card-desc {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.5;
      flex: 1;
    }

    .brand-card-cta {
      margin-top: 12px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.02em;
    }

    .brand-card:hover .brand-card-cta { gap: 8px; }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .tagline { display: none; }
      .hero { height: 400px; }
      .slide-brand { font-size: 2.4rem; }
      .section { padding: 48px 20px; }
      .section-header { flex-direction: column; gap: 6px; }
      .brand-grid { grid-template-columns: 1fr 1fr; gap: 1px; }
    }

    @media (max-width: 480px) {
      .brand-grid { grid-template-columns: 1fr; }
      .slide { padding: 40px 24px; }
    }
  </style>
</head>

    // UUID for each brand (primary/canonical)
    const BRAND_UUIDS = {
      "renpho":     "E2A21CE0-037D-47DE-8EAF-445B25A8875A",
      "reolink":    "201E3A4F-C63F-48A6-87B7-524F985330DA",
      "halova":     "9BEBE13D-0781-43DE-967B-26CF95746E59",
      "grownsy":    "0AB1F9B4-B199-4694-9D81-B5AFE725E08B",
      "it-cosmetics":"F8D9521C-6961-43F8-BB2F-2963DF3E2207",
      "horow":      "A09341BE-FA66-4BD9-80CC-1A75964A8DC1",
      "yitamotor":  "E28BDCDE-D661-43BC-AB00-DB89F391DACE",
      "aiper":      "C03611E3-CC8B-44F0-9326-059AAF46A0B1",
      "plaud":      "8CF9A795-D789-4562-874A-43E632222F8C",
      "cute-stone": "033F62C5-1A33-4D7B-AFF4-1C359716322A",
      "running-girl":"B7ACC67E-2539-43EF-98B5-E77ACC4F1B02",
      "mescomb":    "A34677B1-CC9F-4EC5-8660-F6F5A5E75FE0",
      "hittiona":   "07B15259-3BD4-47D6-B682-B431AF66F916",
      "aurzen":     "16ED44A3-DF5C-4C3D-A734-FFD961269E97",
      "prudiut":    "0198132F-1713-4A28-8AD9-D313AC6E08CB",
      "livebox":    "C714345E-E401-4BB9-9617-C7A8F20B3FFA",
      "imarku":     "6CFD9621-C8D8-47AB-951B-1010C39E5757",
      "olight":     "098E844F-88E8-45DC-901F-203F35540649"
    };

    // ── Banner: pick 5 random brands ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const bannerBrands = shuffle(BRANDS).slice(0, 5);
    let currentSlide = 0;
    let slideInterval;

    function buildBanner() {
      const wrapper = document.getElementById('slidesWrapper');
      const dotsEl = document.getElementById('dots');
      wrapper.innerHTML = '';
      dotsEl.innerHTML = '';

      bannerBrands.forEach((brand, i) => {
        const uuid = BRAND_UUIDS[brand.slug];
        const url = AFFILIATE_URLS[uuid] || brand.favicon ? `https://www.amazon.com/stores/${brand.slug}` : '#';
        const imgSrc = brand.favicon || `https://placehold.co/160x160/1a1a1a/E8FF47?text=${encodeURIComponent(brand.brand)}&font=roboto`;

        wrapper.innerHTML += `
          <a class="slide" href="${url}" target="_blank" rel="noopener noreferrer nofollow">
            <div class="slide-content">
              <img class="slide-brand-img" src="${imgSrc}" alt="${brand.brand} logo" loading="${i===0?'eager':'lazy'}">
              <p class="slide-category">${brand.category_zh} · ${brand.category}</p>
              <h1 class="slide-brand">${brand.brand}</h1>
              <p class="slide-desc">${brand.description}</p>
              <span class="slide-cta">Shop Now →</span>
            </div>
          </a>`;

        dotsEl.innerHTML += `<div class="dot${i===0?' active':''}" onclick="goToSlide(${i})"></div>`;
      });
    }

    function goToSlide(idx) {
      currentSlide = idx;
      document.getElementById('slidesWrapper').style.transform = `translateX(-${idx * 100}%)`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
      resetInterval();
    }

    function nextSlide() { goToSlide((currentSlide + 1) % bannerBrands.length); }
    function prevSlide() { goToSlide((currentSlide - 1 + bannerBrands.length) % bannerBrands.length); }

    function resetInterval() {
      clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, 2000);
    }

    // ── Brand Grid ──
    function buildGrid() {
      const grid = document.getElementById('brandGrid');
      grid.innerHTML = BRANDS.map(brand => {
        const uuid = BRAND_UUIDS[brand.slug];
        const url = AFFILIATE_URLS[uuid] || `https://www.amazon.com/stores/${brand.slug}`;
        const imgSrc = brand.favicon || `https://placehold.co/88x88/1a1a1a/E8FF47?text=${encodeURIComponent(brand.brand.slice(0,2))}&font=roboto`;
        return `
          <a class="brand-card" href="${url}" target="_blank" rel="noopener noreferrer nofollow">
            <div class="brand-card-top">
              <img class="brand-card-img" src="${imgSrc}" alt="${brand.brand}" loading="lazy">
              <div>
                <div class="brand-card-name">${brand.brand}</div>
                <div class="brand-card-cat">${brand.category_zh}</div>
              </div>
            </div>
            <p class="brand-card-desc">${brand.description}</p>
            <span class="brand-card-cta">Shop on Amazon →</span>
          </a>`;
      }).join('');

      document.getElementById('brandCount').textContent = `${BRANDS.length} brands`;
    }

    buildBanner();
    buildGrid();
    slideInterval = setInterval(nextSlide, 2000);
  </script>
