<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VinceMedia — Curated lifestyle brands on Amazon. Discover trusted products across health, home, beauty, tech and more.">
  <meta name="keywords" content="Amazon brands, lifestyle products, health tech, smart home, beauty tools, Amazon store">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://affiliate-vince.github.io/">
  <title>VinceMedia — Curated Brands on Amazon</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="VinceMedia — Curated Brands on Amazon">
  <meta property="og:description" content="Handpicked products across health, home, beauty and tech from trusted Amazon brands.">
  <meta property="og:url" content="https://affiliate-vince.github.io/">
  <meta property="og:site_name" content="VinceMedia">

  <!-- Schema.org -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "VinceMedia",
    "url": "https://affiliate-vince.github.io/",
    "description": "Curated Amazon brand discovery",
    "publisher": {
      "@type": "Organization",
      "name": "VinceMedia",
      "url": "https://affiliate-vince.github.io/"
    }
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230f0f0f'/><text y='.9em' font-size='72' x='50%' text-anchor='middle' dominant-baseline='middle' fill='%23E8FF47' font-family='serif'>V</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://m.media-amazon.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --bg2: #171717;
      --bg3: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text2: #888;
      --accent: #E8FF47;
      --accent-dim: #b8cc35;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo span { color: var(--accent); }

    .header-tagline {
      font-size: 0.78rem;
      color: var(--text2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ─── Hero Banner ─── */
    .hero {
      position: relative;
      height: 520px;
      overflow: hidden;
      background: var(--bg2);
    }

    .slides-wrapper {
      display: flex;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      text-decoration: none;
      position: relative;
      background-size: cover;
      background-position: center;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(15,15,15,0.7) 0%, rgba(15,15,15,0.3) 60%, rgba(232,255,71,0.04) 100%);
      pointer-events: none;
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(232,255,71,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .slide-content {
      text-align: center;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .slide-logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .slide-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 6px;
    }

    .slide-brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 3.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .slide-category {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .slide-desc {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      margin-bottom: 28px;
      font-weight: 300;
      line-height: 1.5;
    }

    .slide-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.03em;
      padding: 12px 28px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .slide-cta:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    /* Dot indicators */
    .dots {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Prev/Next arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(15,15,15,0.65);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      transition: background 0.2s, color 0.2s;
      font-size: 1.1rem;
    }

    .nav-arrow:hover {
      background: rgba(15,15,15,0.9);
      color: var(--accent);
    }

    .nav-arrow.prev { left: 20px; }
    .nav-arrow.next { right: 20px; }

    /* ─── Section ─── */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 40px;
    }

    /* ─── Category Tabs ─── */
    .content-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .cat-sidebar {
      flex-shrink: 0;
      width: 180px;
      position: sticky;
      top: 80px;
    }

    .cat-sidebar-title {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .cat-tabs {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cat-tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      font-family: inherit;
      font-weight: 400;
    }

    .cat-tab:hover {
      background: var(--bg2);
      color: var(--text);
    }

    .cat-tab.active {
      background: var(--bg2);
      color: var(--accent);
      font-weight: 500;
    }

    .cat-tab-count {
      font-size: 0.72rem;
      background: var(--bg3);
      color: var(--text2);
      padding: 2px 7px;
      border-radius: 20px;
      min-width: 24px;
      text-align: center;
    }

    .cat-tab.active .cat-tab-count {
      background: rgba(232,255,71,0.12);
      color: var(--accent);
    }

    .brand-area {
      flex: 1;
      min-width: 0;
    }

    /* ─── Section Header with Search ─── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* Search in section header */
    .search-wrap {
      position: relative;
      width: 240px;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 36px 8px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text2); }
    .search-input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .brand-count {
      font-size: 0.82rem;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ─── Brand Grid ─── */
    .brand-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .brand-card {
      background: var(--bg2);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .brand-card:hover { background: var(--bg3); }

    .card-img-wrap {
      width: 100%;
      height: 160px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }

    .brand-card:hover .card-img { transform: scale(1.04); }

    .card-body {
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .card-logo-wrap {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .card-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    .card-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-cat {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
      flex: 1;
    }

    /* Arrow in bottom-right of card */
    .card-arrow {
      position: absolute;
      bottom: 14px;
      right: 16px;
      color: var(--accent);
      font-size: 1rem;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .brand-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ─── No results ─── */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
      font-size: 0.9rem;
      display: none;
    }

    .no-results.visible { display: block; }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ─── Back to top ─── */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      z-index: 200;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s, background 0.2s;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(232,255,71,0.25);
    }

    .back-to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .back-to-top:hover {
      background: var(--accent-dim);
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      header { padding: 0 20px; }
      .header-tagline { display: none; }
      .content-layout { flex-direction: column; gap: 20px; }
      .cat-sidebar { width: 100%; position: static; }
      .cat-tabs { flex-direction: row; flex-wrap: wrap; }
      .cat-tab { width: auto; }
    }

    @media (max-width: 640px) {
      .hero { height: 420px; }
      .slide-brand { font-size: 2.6rem; }
      .slide { padding: 40px 24px; }
      .section { padding: 48px 20px; }
      .brand-grid { grid-template-columns: 1fr 1fr; }
      .search-wrap { width: 160px; }
      .back-to-top { bottom: 20px; right: 20px; }
    }

    @media (max-width: 420px) {
      .brand-grid { grid-template-columns: 1fr; }
      .search-wrap { width: 120px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">Vince<span>Media</span></a>
    <span class="header-tagline">Curated Brands on Amazon</span>
  </header>

  <!-- Hero Banner -->
  <section class="hero" id="banner">
    <div class="slides-wrapper" id="slidesWrapper"></div>
    <button class="nav-arrow prev" onclick="prevSlide()" aria-label="Previous">&#8592;</button>
    <button class="nav-arrow next" onclick="nextSlide()" aria-label="Next">&#8594;</button>
    <div class="dots" id="dots"></div>
  </section>

  <!-- Brand Grid -->
  <section class="section">
    <div class="content-layout">
      <!-- Category Sidebar -->
      <aside class="cat-sidebar">
        <div class="cat-sidebar-title">Categories</div>
        <div class="cat-tabs" id="catTabs"></div>
      </aside>

      <!-- Brand Area -->
      <div class="brand-area">
        <div class="section-header">
          <h2 class="section-title" id="sectionTitle">All Brands</h2>
          <div class="search-wrap">
            <input
              class="search-input"
              id="searchInput"
              type="search"
              placeholder="Search brands..."
              autocomplete="off"
              aria-label="Search brands"
            >
            <span class="search-icon" aria-hidden="true">⌕</span>
          </div>
          <span class="brand-count" id="brandCount"></span>
        </div>
        <div class="brand-grid" id="brandGrid"></div>
        <div class="no-results" id="noResults">No brands match your search.</div>
      </div>
    </div>
  </section>

  <footer>
    <p>As an Amazon Associate, VinceMedia earns from qualifying purchases.</p>
  </footer>

  <!-- Back to top -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">&#8593;</button>

  <!-- 数据文件（手动维护 brands.js） -->
  <script src="brands.js"></script>
  <script src="affiliate-links.js"></script>

  <script>
    // ── Current filter state ──
    let activeCategory = 'All';
    let searchQuery = '';

    // ── Build category tabs ──
    function buildCategoryTabs() {
      const catCounts = {};
      BRANDS.forEach(b => {
        catCounts[b.category] = (catCounts[b.category] || 0) + 1;
      });

      const tabsEl = document.getElementById('catTabs');
      tabsEl.innerHTML = '';

      // All tab
      const allTab = document.createElement('button');
      allTab.className = 'cat-tab' + (activeCategory === 'All' ? ' active' : '');
      allTab.innerHTML = `<span>All</span><span class="cat-tab-count">${BRANDS.length}</span>`;
      allTab.onclick = () => setCategory('All');
      tabsEl.appendChild(allTab);

      // Category tabs sorted alphabetically
      Object.keys(catCounts).sort().forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-tab' + (activeCategory === cat ? ' active' : '');
        btn.innerHTML = `<span>${cat}</span><span class="cat-tab-count">${catCounts[cat]}</span>`;
        btn.onclick = () => setCategory(cat);
        tabsEl.appendChild(btn);
      });
    }

    function setCategory(cat) {
      activeCategory = cat;
      document.getElementById('sectionTitle').textContent = cat === 'All' ? 'All Brands' : cat;
      document.querySelectorAll('.cat-tab').forEach(t => {
        t.classList.toggle('active', t.textContent.trim().startsWith(cat));
      });
      buildGrid();
    }

    // ── Banner: pick 5 random brands ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const bannerBrands = shuffle(BRANDS).slice(0, 5);
    let currentSlide = 0;
    let slideInterval;

    function buildBanner() {
      const wrapper = document.getElementById('slidesWrapper');
      const dotsEl = document.getElementById('dots');
      wrapper.innerHTML = '';
      dotsEl.innerHTML = '';

      bannerBrands.forEach((brand, i) => {
        const url = AFFILIATE_URLS[brand.slug] || '#';
        const bgStyle = brand.bg
          ? `background-image: url('${brand.bg}'); background-size: cover; background-position: center;`
          : `background: ${brand.gradient};`;

        let logoHtml = '';
        if (brand.favicon) {
          logoHtml = `<div class="slide-logo-wrap">
            <img class="slide-logo" src="${brand.favicon}" alt="${brand.brand}" loading="${i===0?'eager':'lazy'}">
          </div>`;
        }

        wrapper.innerHTML += `
          <a class="slide" href="${url}" target="_blank" rel="noopener noreferrer nofollow" style="${bgStyle}">
            <div class="slide-content">
              ${logoHtml}
              <h1 class="slide-brand">${brand.brand}</h1>
              <p class="slide-category">${brand.category}</p>
              <p class="slide-desc">${brand.description}</p>
              <span class="slide-cta">Shop Now &#8594;</span>
            </div>
          </a>`;

        dotsEl.innerHTML += `<div class="dot${i===0?' active':''}" onclick="goToSlide(${i})"></div>`;
      });
    }

    function goToSlide(idx) {
      currentSlide = idx;
      document.getElementById('slidesWrapper').style.transform = `translateX(-${idx * 100}%)`;
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
      resetInterval();
    }

    function nextSlide() { goToSlide((currentSlide + 1) % bannerBrands.length); }
    function prevSlide() { goToSlide((currentSlide - 1 + bannerBrands.length) % bannerBrands.length); }

    function resetInterval() {
      clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, 10000); // 10 seconds
    }

    // ── Brand Grid ──
    function buildGrid() {
      const grid = document.getElementById('brandGrid');
      const noResults = document.getElementById('noResults');
      const countEl = document.getElementById('brandCount');

      const q = searchQuery.toLowerCase().trim();

      let visible = BRANDS;

      // Filter by category
      if (activeCategory !== 'All') {
        visible = visible.filter(b => b.category === activeCategory);
      }

      // Filter by search
      if (q) {
        visible = visible.filter(b =>
          b.brand.toLowerCase().includes(q) ||
          b.category.toLowerCase().includes(q) ||
          b.description.toLowerCase().includes(q) ||
          b.slug.toLowerCase().includes(q)
        );
      }

      if (visible.length === 0) {
        grid.innerHTML = '';
        noResults.classList.add('visible');
        countEl.textContent = '';
        return;
      }

      noResults.classList.remove('visible');
      countEl.textContent = `${visible.length} brand${visible.length !== 1 ? 's' : ''}`;

      grid.innerHTML = visible.map(brand => {
        const url = AFFILIATE_URLS[brand.slug];

        const cardBgStyle = brand.bg
          ? `background-image: url('${brand.bg}'); background-size: cover; background-position: center;`
          : `background: ${brand.gradient};`;

        let logoHtml = '';
        if (brand.favicon) {
          logoHtml = `<div class="card-logo-wrap">
            <img class="card-logo" src="${brand.favicon}" alt="${brand.brand}">
          </div>`;
        }

        return `
          <a class="brand-card" href="${url}" target="_blank" rel="noopener noreferrer nofollow">
            <div class="card-img-wrap" style="${cardBgStyle}">
              ${brand.bg ? `<img class="card-img" src="${brand.bg}" alt="" loading="lazy" style="opacity:0;position:absolute;" onerror="this.style.display='none'">` : ''}
            </div>
            <div class="card-body">
              <div class="card-top">
                ${logoHtml}
                <div>
                  <div class="card-name">${brand.brand}</div>
                  <div class="card-cat">${brand.category}</div>
                </div>
              </div>
              <p class="card-desc">${brand.description}</p>
              <span class="card-arrow" aria-hidden="true">&#8594;</span>
            </div>
          </a>`;
      }).join('');
    }

    // ── Fuzzy Search ──
    const searchInput = document.getElementById('searchInput');
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = searchInput.value;
        buildGrid();
      }, 150);
    });

    // ── Back to Top ──
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }
    }, { passive: true });

    // ── Init ──
    buildBanner();
    buildCategoryTabs();
    buildGrid();
    slideInterval = setInterval(nextSlide, 10000); // 10 seconds
  </script>
</body>
</html>
