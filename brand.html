          <p class="text-sm text-zinc-600 mb-10">honest match — no fluff</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="fit-card border-emerald-400/10">
              <div class="flex items-center gap-2 mb-4">
                <div class="w-7 h-7 rounded-full bg-emerald-400/15 flex items-center justify-center"><i class="fas fa-check text-emerald-400 text-xs"></i></div>
                <span class="text-sm font-bold text-zinc-200">perfect for</span>
              </div>
              <ul class="space-y-2">
                ${data.perfectFor.map(s => `<li class="flex items-start gap-2 text-xs text-zinc-400"><i class="fas fa-circle text-[5px] text-emerald-400 mt-1.5"></i><span>${s}</span></li>`).join('')}
              </ul>
            </div>
            <div class="fit-card border-red-400/10">
              <div class="flex items-center gap-2 mb-4">
                <div class="w-7 h-7 rounded-full bg-red-400/15 flex items-center justify-center"><i class="fas fa-xmark text-red-400 text-xs"></i></div>
                <span class="text-sm font-bold text-zinc-200">skip it if</span>
              </div>
              <ul class="space-y-2">
                ${data.skipItIf.map(s => `<li class="flex items-start gap-2 text-xs text-zinc-500"><i class="fas fa-circle text-[5px] text-red-400/40 mt-1.5"></i><span>${s}</span></li>`).join('')}
              </ul>
            </div>
          </div>
        </section>

        <!-- Real Buyer Reviews -->
        <section id="reviews" class="bg-zinc-900/40 border-y border-white/[0.03] py-16">
          <div class="max-w-6xl mx-auto px-5 sm:px-8">
            <h2 class="text-2xl font-bold tracking-tight text-zinc-100 mb-2">what real buyers say</h2>
            <p class="text-sm text-zinc-600 mb-10">verified amazon reviews</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              ${data.reviewsData.map(r => `
                <div class="review-card">
                  <div class="flex items-center gap-1 text-amber-400 text-xs mb-3">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
                  <p class="text-xs text-zinc-300 leading-relaxed mb-3">"${r.text}"</p>
                  <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-[9px] font-bold text-zinc-400">${r.name.charAt(0)}</div>
                    <span class="text-xs text-zinc-500">${r.name}</span>
                    ${r.verified ? '<i class="fas fa-check-circle text-emerald-400 text-[10px] ml-auto"></i>' : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <!-- Bottom CTA -->
        <section class="max-w-4xl mx-auto px-5 sm:px-8 py-16">
          <div class="bottom-cta-card">
            <h2 class="text-2xl sm:text-3xl font-bold tracking-tight text-zinc-100">ready to upgrade?<br><span class="text-lime-400">this is the one.</span></h2>
            <p class="text-sm text-zinc-500 mt-3 max-w-md mx-auto">Thousands of verified buyers can't be wrong. See why ${brand.brand} is a VinceMedia pick.</p>
            <a href="${affiliateLink}" target="_blank" rel="noopener noreferrer nofollow" class="cta-btn mt-6 inline-flex">shop on amazon <i class="fas fa-arrow-right text-sm"></i></a>
          </div>
        </section>
      `;
    }
  </script>
</body>
</html>
